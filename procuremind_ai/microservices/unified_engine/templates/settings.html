{% extends "base.html" %}

{% block content %}
<h1 style="margin-top: 0;">System Settings</h1>
<p style="color: var(--text-muted);">Configure AI providers and engine thresholds locally.</p>

<div class="panel" style="max-width: 600px;">
    <form id="settingsForm">
        <h3 style="margin-top: 0; padding-bottom: 10px; border-bottom: 1px solid var(--border);">AI Configuration</h3>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-size: 0.9rem; margin-bottom: 5px; font-weight: 500;">AI Provider</label>
            <select id="setAiProvider" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box;" onchange="toggleProviderSettings()">
                <option value="openai">OpenAI</option>
                <option value="gemini">Google Gemini</option>
            </select>
        </div>

        <div id="openaiSettings">
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-size: 0.9rem; margin-bottom: 5px; font-weight: 500;">OpenAI API Key</label>
                <input type="password" id="setApiKey" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box;" placeholder="sk-...">
                <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 5px;">Leave blank to use the Mock AI simulator.</div>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.9rem; margin-bottom: 5px; font-weight: 500;">OpenAI Vision Model</label>
                <select id="setModel" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box;">
                    <option value="gpt-4o">GPT-4o (Multimodal Vision)</option>
                    <option value="gpt-4-turbo">GPT-4 Turbo</option>
                </select>
            </div>
        </div>

        <div id="geminiSettings" style="display: none;">
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-size: 0.9rem; margin-bottom: 5px; font-weight: 500;">Gemini API Key</label>
                <input type="password" id="setGeminiKey" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box;" placeholder="AIza...">
                <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 5px;">Leave blank to use the Mock AI simulator.</div>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.9rem; margin-bottom: 5px; font-weight: 500;">Gemini Vision Model</label>
                <select id="setGeminiModel" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box;">
                    <option value="gemini-1.5-flash">Gemini 1.5 Flash (Fast)</option>
                    <option value="gemini-1.5-pro">Gemini 1.5 Pro (Accurate)</option>
                </select>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--border); margin: 30px 0;">

        <h3 style="margin-top: 0; padding-bottom: 10px; border-bottom: 1px solid var(--border);">Threshold Configurations</h3>
        
        <div style="margin-bottom: 15px;">
            <label style="display: block; font-size: 0.9rem; margin-bottom: 5px; font-weight: 500;">PO Variance Tolerance (%)</label>
            <input type="number" step="0.01" id="tolerance_percentage" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; font-size: 0.9rem; margin-bottom: 5px; font-weight: 500;">Fraud Critical Threshold (0-100)</label>
            <input type="number" id="fraud_critical_threshold" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box;">
        </div>
        
        <button type="button" class="btn" onclick="saveSettings()">Save Configuration</button>
        <span id="saveSuccess" style="color: var(--success); font-weight: 600; margin-left: 10px; display: none;">Saved Successfully!</span>
    </form>
</div>

<script>
    function toggleProviderSettings() {
        const provider = document.getElementById('setAiProvider').value;
        if (provider === 'gemini') {
            document.getElementById('openaiSettings').style.display = 'none';
            document.getElementById('geminiSettings').style.display = 'block';
        } else {
            document.getElementById('openaiSettings').style.display = 'block';
            document.getElementById('geminiSettings').style.display = 'none';
        }
    }

    document.addEventListener("DOMContentLoaded", async () => {
        const res = await fetch('/api/settings');
        const data = await res.json();
        
        document.getElementById('setAiProvider').value = data.ai_provider || 'openai';
        document.getElementById('setApiKey').value = data.openai_api_key || '';
        document.getElementById('setModel').value = data.ai_model || 'gpt-4o';
        
        document.getElementById('setGeminiKey').value = data.gemini_api_key || '';
        document.getElementById('setGeminiModel').value = data.gemini_model || 'gemini-1.5-flash';
        
        document.getElementById('tolerance_percentage').value = data.tolerance_percentage || 0.02;
        document.getElementById('fraud_critical_threshold').value = data.fraud_critical_threshold || 50;

        toggleProviderSettings();
    });

    async function saveSettings() {
        const payload = {
            ai_provider: document.getElementById('setAiProvider').value,
            openai_api_key: document.getElementById('setApiKey').value,
            ai_model: document.getElementById('setModel').value,
            gemini_api_key: document.getElementById('setGeminiKey').value,
            gemini_model: document.getElementById('setGeminiModel').value,
            tolerance_percentage: document.getElementById('tolerance_percentage').value,
            fraud_critical_threshold: document.getElementById('fraud_critical_threshold').value
        };

        try {
            const res = await fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                alert("Configuration Saved!");
            } else {
                alert("Failed to save configuration.");
            }
        } catch(err) {
            alert("Error: " + err.message);
        }
    }</script>
{% endblock %}
